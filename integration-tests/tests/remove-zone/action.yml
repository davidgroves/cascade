# Making reusable composite actions documented at
# https://docs.github.com/en/actions/tutorials/create-actions/create-a-composite-action#creating-a-composite-action-within-the-same-repository
name: 'Add, sign and remove a zone.'
description: 'Add, sign and remove a zone.'
defaults:
  # see: https://docs.github.com/en/actions/reference/workflows-and-actions/workflow-syntax#defaultsrunshell
  run:
    shell: bash --noprofile --norc -eo pipefail -x {0}
inputs:
  log-level:
    description: The level of logging that Cascade should output.
    required: false
    default: debug
    type: choice
    options:
      - error
      - warning
      - info
      - debug
      - trace
runs:
  using: "composite"
  steps:
    - uses: ./.github/actions/prepare-systest-env
    - uses: ./.github/actions/setup-and-start-cascade
      with:
        log-level: ${{ inputs.log-level }}

    - name: Add a zone
      run: |
        ZONE_DIR=$(integration-tests/scripts/get-default-path.sh test-env:nameserver-base-dir)
        ZONE_FILE="${ZONE_DIR}/nsd-primary/zones/example.test.primary-zone"
        cascade zone add --policy default --source "${ZONE_FILE}" example.test

    - name: Cascade should list the zone
      run: |
        timeout=10 # seconds
        start=$(date +%s)
        until cascade zone list | grep -q "example.test"; do
          if (($(date +%s) > (start + timeout))); then
            cascade zone list
            echo "timeout: zone list output did not include the zone" >&2
            exit 1
          fi
          sleep 1
        done

    - name: Check zone status
      run: |
        timeout=10 # seconds
        start=$(date +%s)
        until cascade zone status example.test | grep -q "Published zone available"; do
          if (($(date +%s) > (start + timeout))); then
            cascade zone status example.test
            echo "timeout: zone status did not report published zone available" >&2
            exit 1
          fi
          sleep 1
        done

    - name: Querying the zone should succeed
      run: |
        dig +noall @127.0.0.1 -p 4542 example.test AXFR

    - name: Remove the zone
      run: cascade zone remove example.test

    - name: Cascade should no longer list the zone
      run: |
        timeout=10 # seconds
        start=$(date +%s)
        until ! cascade zone list | grep -q "example.test"; do
          if (($(date +%s) > (start + timeout))); then
            cascade zone list
            echo "timeout: zone list output still includes the zone" >&2
            exit 1
          fi
          sleep 1
        done

    - name: Querying the zone should now fail
      run: |
        dig @127.0.0.1 -p 4542 example.test SOA | grep NXDOMAIN

    - name: Check that Cascade is still running
      run: cascade health

    - name: Print log files on any failure in this job
      uses: ./.github/actions/print-logfiles
      if: failure()
