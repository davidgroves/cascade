# Making reusable composite actions documented at
# https://docs.github.com/en/actions/tutorials/create-actions/create-a-composite-action#creating-a-composite-action-within-the-same-repository
name: 'Add a zone, approve the unsigned zone, query the published zone'
description: 'Add a zone, approve the unsigned zone, query the published zone'
defaults:
  # see: https://docs.github.com/en/actions/reference/workflows-and-actions/workflow-syntax#defaultsrunshell
  run:
    shell: bash --noprofile --norc -eo pipefail -x {0}
inputs:
  log-level:
    description: The level of logging that Cascade should output.
    required: false
    default: debug
    type: choice
    options:
      - error
      - warning
      - info
      - debug
      - trace
runs:
  using: "composite"
  steps:
    - uses: ./.github/actions/prepare-systest-env
    - uses: ./.github/actions/setup-and-start-cascade
      with:
        log-level: ${{ inputs.log-level }}

    - name: Add a zone served by the NSD primary
      run: |
        cascade zone add --policy default --source 127.0.0.1:1055 example.test
    - name: Check zone status
      run: |
        timeout=10 # seconds
        start=$(date +%s)
        until cascade zone status example.test | grep -q "Published zone available"; do
          if (($(date +%s) > (start + timeout))); then
            cascade zone status example.test
            echo "::error:: timeout: zone status did not report published zone available"
            exit 1
          fi
          sleep 1
        done
    - name: Query zone
      run: |
        dig @127.0.0.1 -p 4542 example.test AXFR
    - name: Tell the NSD secondary that the zone is now available
      # Only necessary if NOTIFY is not setup for cascade
      run: |
        ./integration-tests/scripts/manage-test-environment.sh control nsd-secondary transfer example.test
    - name: The new zone should now be available via the resolver
      run: |
        dig text.example.test TXT | grep "Hello World"
    - name: Print log files on any failure in this job
      uses: ./.github/actions/print-logfiles
      if: failure()
